    <div class="container">

                    <div class="meaning" id="meaning">

            </div>

            btn.classList.add('playing');
            
            // 使用 Cambridge Dictionary 的英式发音
            const audio = new Audio(`https://dictionary.cambridge.org/media/english/uk_pron/u/uk${word.word.charAt(0)}/uk_${word.word}_GB_1.mp3`);
            
            audio.onended = () => {
                btn.classList.remove('playing');
            };
            
            audio.onerror = () => {
                btn.classList.remove('playing');
                // 备用：使用 Forvo
                playForvoSound(word.word);
            };
            
            audio.play().catch(() => {
                btn.classList.remove('playing');
                playForvoSound(word.word);
            });
        }

                        document.getElementById('add-btn').dataset.phoneticUK = phoneticUK;
                        document.getElementById('add-btn').dataset.phoneticUS = phoneticUS;
                        document.getElementById('add-btn').dataset.meaning = meaningCn;
                        document.getElementById('add-btn').dataset.meaningEn = meaningEn;
                        document.getElementById('add-btn').dataset.example = example;
                    } else {
                        // 单词未找到
                        document.getElementById('preview-word').textContent = word;
                        document.getElementById('preview-phonetic').innerHTML = '<span style="color: #f44336;">未找到发音</span>';
                        document.getElementById('preview-meaning').innerHTML = '<span style="color: #f44336;">未找到释义，请手动输入</span>';
                        document.getElementById('add-btn').disabled = false;
                        document.getElementById('add-btn').dataset.word = word;
                        document.getElementById('add-btn').dataset.phoneticUK = '';
                        document.getElementById('add-btn').dataset.phoneticUS = '';
                        document.getElementById('add-btn').dataset.meaning = '';
                        document.getElementById('add-btn').dataset.meaningEn = '';
                        document.getElementById('add-btn').dataset.example = '';
                    }
                } catch (e) {
                    console.error(e);
                    document.getElementById('preview-word').textContent = word;
                    document.getElementById('preview-phonetic').innerHTML = '<span style="color: #f44336;">加载失败</span>';
                    document.getElementById('add-btn').disabled = false;
                }
            }, 500);
        }

            const dict = {

        // 添加单词
        function addWord() {
            const btn = document.getElementById('add-btn');
            const input = document.getElementById('new-word');
            
            const newWord = {
                word: btn.dataset.word || input.value.trim(),
                phoneticUK: btn.dataset.phoneticUK || '/-/',
                phoneticUS: btn.dataset.phoneticUS || '/-/',
                meaning: btn.dataset.meaning || '待添加',
                meaningEn: btn.dataset.meaningEn || '',
                example: btn.dataset.example || ''
            };
            
            // 检查重复
            if (words.some(w => w.word.toLowerCase() === newWord.word.toLowerCase())) {
                alert('单词已存在！');
                return;
            }
            
            words.unshift(newWord); // 添加到开头
            todayStats.total = words.length;
            currentIndex = 0;
            
            saveToStorage();
            displayCurrentWord();
            updateStats();
            renderWordList();
            
            // 重置表单
            input.value = '';
            document.getElementById('word-preview').style.display = 'none';
            document.getElementById('add-btn').disabled = true;
            
            alert('单词添加成功！');
            switchTab('study');
        }
    </script>
