<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>单词背诵 - 英式发音</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: linear-gradient(135deg, #667eea, #764ba2); min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { color: white; text-align: center; margin-bottom: 20px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 15px; background: rgba(255,255,255,0.2); border: none; color: white; border-radius: 10px; cursor: pointer; font-size: 16px; }
        .tab.active { background: white; color: #667eea; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card { background: white; border-radius: 16px; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); margin-bottom: 20px; }
        .word-display { text-align: center; }
        .word { font-size: 2.5rem; margin-bottom: 10px; }
        .phonetic { color: #666; margin-bottom: 15px; }
        .speaker-btn { font-size: 1.5rem; background: none; border: none; cursor: pointer; margin-bottom: 15px; }
        .meaning { font-size: 1.2rem; line-height: 1.6; text-align: left; }
        .meaning strong { color: #667eea; }
        .btn-group { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 15px; border: none; border-radius: 10px; font-size: 1rem; cursor: pointer; }
        .btn-danger { background: #f44336; color: white; }
        .btn-success { background: #4caf50; color: white; }
        .word-list { background: white; border-radius: 16px; padding: 20px; max-height: 400px; overflow-y: auto; }
        .word-item { padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; }
        .word-item:hover { background: #f5f5f5; }
    </style>
</head>
<body>
    <div class="container">
        <h1>单词背诵</h1>
        <div class="tabs">
            <button class="tab active" onclick="switchTab('study')">学习</button>
            <button class="tab" onclick="switchTab('list')">列表</button>
        </div>
        
        <div id="study" class="tab-content active">
            <div class="card">
                <div class="word-display">
                    <div class="word" id="current-word">Hello</div>
                    <button class="speaker-btn" onclick="playUK()">🔊</button>
                    <div class="meaning" id="meaning">中文: 你好</div>
                </div>
            </div>
            <div class="btn-group">
                <button class="btn btn-danger" onclick="nextWord()">下一个</button>
                <button class="btn btn-success" onclick="markKnown()">认识</button>
            </div>
        </div>
        
        <div id="list" class="tab-content">
            <div class="word-list" id="word-list"></div>
        </div>
    </div>
    
    <script>
    var words = [
        {word: 'easement', meaning: '地役权'},
        {word: 'negligence', meaning: '过失'},
        {word: 'plaintiff', meaning: '原告'},
        {word: 'defendant', meaning: '被告'},
        {word: 'contract', meaning: '合同'},
        {word: 'tort', meaning: '侵权'},
        {word: 'evidence', meaning: '证据'},
        {word: 'judge', meaning: '法官'},
        {word: 'jury', meaning: '陪审团'},
        {word: 'appeal', meaning: '上诉'},
        {word: 'verdict', meaning: '裁决'},
        {word: 'bail', meaning: '保释'},
        {word: 'damages', meaning: '赔偿金'},
        {word: 'trust', meaning: '信托'},
        {word: 'copyright', meaning: '版权'},
        {word: 'patent', meaning: '专利'},
        {word: 'bankruptcy', meaning: '破产'},
        {word: 'inheritance', meaning: '继承'},
        {word: 'fraud', meaning: '欺诈'},
        {word: 'murder', meaning: '谋杀'}
    ];
    
    var currentIndex = 0;
    
    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
        document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });
        event.target.classList.add('active');
        document.getElementById(tab).classList.add('active');
        if(tab === 'list') renderList();
    }
    
    function displayWord() {
        var w = words[currentIndex];
        document.getElementById('current-word').textContent = w.word;
        document.getElementById('meaning').textContent = w.meaning;
    }
    
    function nextWord() {
        currentIndex = (currentIndex + 1) % words.length;
        displayWord();
    }
    
    function markKnown() {
        nextWord();
    }
    
    function playUK() {
        var w = words[currentIndex].word;
        var url = 'https://dictionary.cambridge.org/media/english/uk_pron/u/uk' + w.charAt(0) + '/uk_' + w + '_GB_1.mp3';
        new Audio(url).play().catch(function() { alert('发音不可用'); });
    }
    
    function renderList() {
        var list = document.getElementById('word-list');
        list.innerHTML = words.map(function(w, i) {
            return '<div class="word-item" onclick="currentIndex=' + i + '; switchTab(\'study\'); displayWord()"><b>' + w.word + '</b> - ' + w.meaning + '</div>';
        }).join('');
    }
    
    displayWord();
    </script>
</body>
</html>
