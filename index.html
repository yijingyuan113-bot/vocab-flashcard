<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>单词背诵 - 英式发音</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }
        
        .word-display {
            text-align: center;
        }
        
        .word {
            font-size: 2.5rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }
        
        .phonetic {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 20px;
        }
        
        .phonetic .uk {
            color: #4CAF50;
        }
        
        .phonetic .us {
            color: #2196F3;
        }
        
        .meaning {
            font-size: 1.1rem;
            color: #555;
            line-height: 1.6;
            margin-bottom: 20px;
            text-align: left;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
        }
        
        .example {
            font-style: italic;
            color: #777;
            margin-top: 10px;
            padding-left: 15px;
            border-left: 3px solid #667eea;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin: 5px;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }
        
        .btn-success {
            background: #4CAF50;
            color: white;
        }
        
        .btn-success:hover {
            background: #45a049;
        }
        
        .btn-danger {
            background: #f44336;
            color: white;
        }
        
        .btn-danger:hover {
            background: #da190b;
        }
        
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .stats {
            color: white;
            font-size: 0.9rem;
        }
        
        .add-word-form {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .add-word-form input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
        }
        
        .add-word-form input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .word-list {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .word-list h2 {
            color: #333;
            margin-bottom: 15px;
        }
        
        .word-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
        }
        
        .word-item:hover {
            background: #f9f9f9;
        }
        
        .word-item:last-child {
            border-bottom: none;
        }
        
        .word-item .word-text {
            font-weight: 500;
            color: #333;
        }
        
        .word-item .word-meaning {
            font-size: 0.85rem;
            color: #666;
        }
        
        .word-item .delete-btn {
            background: none;
            border: none;
            color: #999;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 5px;
        }
        
        .word-item .delete-btn:hover {
            color: #f44336;
        }
        
        .empty-state {
            text-align: center;
            color: #999;
            padding: 40px;
        }
        
        .speaker-btn {
            background: #667eea;
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            transition: all 0.3s;
        }
        
        .speaker-btn:hover {
            background: #5568d3;
            transform: scale(1.1);
        }
        
        .speaker-btn.playing {
            animation: pulse 0.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
        }
        
        .tab.active {
            background: white;
            color: #667eea;
        }
        
        .hidden {
            display: none;
        }
        
        @media (max-width: 480px) {
            .word {
                font-size: 2rem;
            }
            .btn-group {
                flex-direction: column;
            }
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 单词背诵</h1>
        
        <div class="tabs">
            <button class="tab active" onclick="switchTab('study')">学习模式</button>
            <button class="tab" onclick="switchTab('list')">单词列表</button>
            <button class="tab" onclick="switchTab('add')">添加单词</button>
        </div>
        
        <!-- 学习模式 -->
        <div id="study-mode">
            <div class="card">
                <div class="word-display">
                    <div class="word" id="current-word">Hello</div>
                    <div class="phonetic" id="phonetic">
                        <span class="uk">BrE /həˈləʊ/</span> | <span class="us">AmE /həˈloʊ/</span>
                    </div>
                    <button class="speaker-btn" onclick="playSound()" id="speaker-btn">🔊</button>
                    <div class="meaning" id="meaning">
                        <strong>中文:</strong> 你好；喂<br><br>
                        <strong>English:</strong> used as a greeting or to begin a telephone conversation
                        <div class="example">"Hello, how are you?"</div>
                    </div>
                </div>
            </div>
            
            <div class="btn-group">
                <button class="btn btn-danger" onclick="markWord('hard')">❌ 不会</button>
                <button class="btn btn-primary" onclick="markWord('skip')">⏭️ 跳过</button>
                <button class="btn btn-success" onclick="markWord('known')">✅ 认识</button>
            </div>
        </div>
        
        <!-- 单词列表 -->
        <div id="list-mode" class="hidden">
            <div class="word-list">
                <h2>我的单词本 (<span id="word-count">0</span>个)</h2>
                <div id="word-list-container">
                    <div class="empty-state">暂无单词，请先添加</div>
                </div>
            </div>
        </div>
        
        <!-- 添加单词 -->
        <div id="add-mode" class="hidden">
            <div class="card">
                <h2 style="margin-bottom: 20px; color: #333;">添加新单词</h2>
                <div class="add-word-form">
                    <input type="text" id="new-word" placeholder="输入英文单词" onkeyup="fetchWordInfo()">
                </div>
                <div id="word-preview" class="meaning" style="display: none;">
                    <div class="word" id="preview-word" style="font-size: 1.5rem; margin-bottom: 10px;"></div>
                    <div class="phonetic" id="preview-phonetic" style="margin-bottom: 15px;"></div>
                    <div id="preview-meaning"></div>
                </div>
                <button class="btn btn-primary" style="width: 100%; margin-top: 15px;" onclick="addWord()" id="add-btn" disabled>添加到单词本</button>
            </div>
        </div>
        
        <div class="controls" style="margin-top: 20px;">
            <div class="stats">
                今日进度: <span id="today-known">0</span> / <span id="today-total">0</span> | 
                认识: <span id="known-count">0</span> | 
                不会: <span id="hard-count">0</span>
            </div>
        </div>
    </div>

    <script>
        // 初始单词库
        let words = [
            {
                word: 'hello',
                phoneticUK: '/həˈləʊ/',
                phoneticUS: '/həˈloʊ/',
                meaning: '你好；喂（用于问候或电话开头）',
                meaningEn: 'used as a greeting or to begin a telephone conversation',
                example: 'Hello, how are you?'
            },
            {
                word: 'world',
                phoneticUK: '/wɜːld/',
                phoneticUS: '/wɜːrld/',
                meaning: '世界',
                meaningEn: 'the earth and all the people, places, and things on it',
                example: 'Travel around the world'
            },
            {
                word: 'beautiful',
                phoneticUK: '/ˈbjuːtɪf(ə)l/',
                phoneticUS: '/ˈbjuːtɪf(ə)l/',
                meaning: '美丽的；漂亮的',
                meaningEn: 'pleasing to the senses',
                example: 'What a beautiful day!'
            },
            {
                word: 'technology',
                phoneticUK: '/tekˈnɒlədʒi/',
                phoneticUS: '/tekˈnɑːlədʒi/',
                meaning: '科技；技术',
                meaningEn: 'the use of scientific knowledge for practical purposes',
                example: 'Modern technology has changed our lives'
            },
            {
                word: 'important',
                phoneticUK: '/ɪmˈpɔːt(ə)nt/',
                phoneticUS: '/ɪmˈpɔːrt(ə)nt/',
                meaning: '重要的',
                meaningEn: 'of great importance; significant',
                example: 'It is important to learn English'
            }
        ];
        
        // 学习状态
        let currentIndex = 0;
        let todayStats = { known: 0, total: words.length };
        let knownWords = new Set();
        let hardWords = new Set();
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadFromStorage();
            displayCurrentWord();
            updateStats();
            renderWordList();
        });
        
        // 从 localStorage 加载
        function loadFromStorage() {
            const saved = localStorage.getItem('vocabWords');
            if (saved) {
                words = JSON.parse(saved);
            }
            const known = localStorage.getItem('vocabKnown');
            if (known) {
                knownWords = new Set(JSON.parse(known));
            }
            const hard = localStorage.getItem('vocabHard');
            if (hard) {
                hardWords = new Set(JSON.parse(hard));
            }
            todayStats.total = words.length;
        }
        
        // 保存到 localStorage
        function saveToStorage() {
            localStorage.setItem('vocabWords', JSON.stringify(words));
            localStorage.setItem('vocabKnown', JSON.stringify([...knownWords]));
            localStorage.setItem('vocabHard', JSON.stringify([...hardWords]));
        }
        
        // 显示当前单词
        function displayCurrentWord() {
            if (words.length === 0) {
                document.getElementById('current-word').textContent = '暂无单词';
                document.getElementById('phonetic').innerHTML = '请添加单词';
                document.getElementById('meaning').innerHTML = '';
                return;
            }
            
            const w = words[currentIndex];
            document.getElementById('current-word').textContent = w.word;
            document.getElementById('phonetic').innerHTML = 
                `<span class="uk">BrE ${w.phoneticUK}</span> | <span class="us">AmE ${w.phoneticUS}</span>`;
            document.getElementById('meaning').innerHTML = `
                <strong>中文:</strong> ${w.meaning}<br><br>
                <strong>English:</strong> ${w.meaningEn}
                ${w.example ? `<div class="example">"${w.example}"</div>` : ''}
            `;
        }
        
        // 播放英式发音
        function playSound() {
            const word = words[currentIndex];
            if (!word) return;
            
            const btn = document.getElementById('speaker-btn');
            btn.classList.add('playing');
            
            // 使用 Cambridge Dictionary 的英式发音
            const audio = new Audio(`https://dictionary.cambridge.org/media/english/uk_pron/u/uk${word.word.charAt(0)}/uk_${word.word}_GB_1.mp3`);
            
            audio.onended = () => {
                btn.classList.remove('playing');
            };
            
            audio.onerror = () => {
                btn.classList.remove('playing');
                // 备用：使用 Forvo
                playForvoSound(word.word);
            };
            
            audio.play().catch(() => {
                btn.classList.remove('playing');
                playForvoSound(word.word);
            });
        }
        
        // 备用发音方案
        function playForvoSound(word) {
            const audio = new Audio(`https://audio.forvo.com/audio/mp3/${encodeURIComponent(word)}`);
            audio.play().catch(() => {
                // 最后备用：使用语音合成
                speakWord(word);
            });
        }
        
        // 浏览器语音合成备用
        function speakWord(word) {
            const utterance = new SpeechSynthesisUtterance(word);
            utterance.lang = 'en-GB';
            utterance.rate = 0.8;
            speechSynthesis.speak(utterance);
        }
        
        // 标记单词状态
        function markWord(status) {
            const word = words[currentIndex];
            
            if (status === 'known') {
                knownWords.add(word.word);
                todayStats.known++;
            } else if (status === 'hard') {
                hardWords.add(word.word);
            }
            
            saveToStorage();
            nextWord();
            updateStats();
        }
        
        // 下一个单词
        function nextWord() {
            if (words.length === 0) return;
            currentIndex = (currentIndex + 1) % words.length;
            displayCurrentWord();
        }
        
        // 更新统计
        function updateStats() {
            document.getElementById('today-known').textContent = todayStats.known;
            document.getElementById('today-total').textContent = todayStats.total;
            document.getElementById('known-count').textContent = knownWords.size;
            document.getElementById('hard-count').textContent = hardWords.size;
            document.getElementById('word-count').textContent = words.length;
        }
        
        // 渲染单词列表
        function renderWordList() {
            const container = document.getElementById('word-list-container');
            
            if (words.length === 0) {
                container.innerHTML = '<div class="empty-state">暂无单词，请先添加</div>';
                return;
            }
            
            container.innerHTML = words.map((w, i) => `
                <div class="word-item" onclick="goToWord(${i})">
                    <div>
                        <div class="word-text">${w.word}</div>
                        <div class="word-meaning">${w.meaning}</div>
                    </div>
                    <button class="delete-btn" onclick="event.stopPropagation(); deleteWord(${i})">×</button>
                </div>
            `).join('');
        }
        
        // 跳转到指定单词
        function goToWord(index) {
            currentIndex = index;
            displayCurrentWord();
            switchTab('study');
        }
        
        // 删除单词
        function deleteWord(index) {
            if (confirm('确定删除这个单词吗？')) {
                const word = words[index];
                words.splice(index, 1);
                knownWords.delete(word.word);
                hardWords.delete(word.word);
                
                if (currentIndex >= words.length) {
                    currentIndex = Math.max(0, words.length - 1);
                }
                
                saveToStorage();
                displayCurrentWord();
                updateStats();
                renderWordList();
            }
        }
        
        // 切换标签页
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab')[['study', 'list', 'add'].indexOf(tab)].classList.add('active');
            
            document.getElementById('study-mode').classList.toggle('hidden', tab !== 'study');
            document.getElementById('list-mode').classList.toggle('hidden', tab !== 'list');
            document.getElementById('add-mode').classList.toggle('hidden', tab !== 'add');
        }
        
        // 获取单词信息（自动填充）
        let debounceTimer;
        function fetchWordInfo() {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(async () => {
                const input = document.getElementById('new-word');
                const word = input.value.trim().toLowerCase();
                
                if (word.length < 2) {
                    document.getElementById('word-preview').style.display = 'none';
                    document.getElementById('add-btn').disabled = true;
                    return;
                }
                
                // 检查是否已存在
                if (words.some(w => w.word.toLowerCase() === word)) {
                    alert('这个单词已经存在了！');
                    document.getElementById('add-btn').disabled = true;
                    return;
                }
                
                // 显示加载状态
                document.getElementById('preview-word').textContent = '加载中...';
                document.getElementById('word-preview').style.display = 'block';
                
                try {
                    // 使用免费词典 API
                    const response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
                    const data = await response.json();
                    
                    if (Array.isArray(data) && data.length > 0) {
                        const entry = data[0];
                        const phonetics = entry.phonetics || [];
                        
                        // 获取英式发音
                        let phoneticUK = '';
                        let phoneticUS = '';
                        let audioUK = '';
                        
                        for (const p of phonetics) {
                            if (p.text && p.text.includes('/')) {
                                if (p.text.includes('əʊ') || p.text.includes('ɑː')) {
                                    phoneticUK = p.text;
                                } else if (p.text.includes('oʊ') || p.text.includes('ɑː')) {
                                    phoneticUS = p.text;
                                }
                            }
                            if (p.audio && p.audio.includes('-uk') || (p.audio && !p.audio.includes('-us'))) {
                                audioUK = p.audio;
                            }
                        }
                        
                        // 获取释义
                        let meaningCn = '';
                        let meaningEn = '';
                        let example = '';
                        
                        if (entry.meanings && entry.meanings.length > 0) {
                            const m = entry.meanings[0];
                            meaningEn = m.definitions && m.definitions[0] ? m.definitions[0].definition : '';
                            example = m.definitions && m.definitions[0] ? m.definitions[0].example || '' : '';
                            
                            // 简单翻译
                            meaningCn = getSimpleTranslation(entry.word, meaningEn);
                        }
                        
                        phoneticUK = phoneticUK || (phonetics[0] ? phonetics[0].text : '');
                        phoneticUS = phoneticUS || (phonetics[1] ? phonetics[1].text : '');
                        
                        document.getElementById('preview-word').textContent = entry.word;
                        document.getElementById('preview-phonetic').innerHTML = 
                            `<span class="uk">BrE ${phoneticUK || 'N/A'}</span> | <span class="us">AmE ${phoneticUS || 'N/A'}</span>`;
                        document.getElementById('preview-meaning').innerHTML = `
                            <strong>中文:</strong> ${meaningCn}<br><br>
                            <strong>English:</strong> ${meaningEn}
                            ${example ? `<div class="example">"${example}"</div>` : ''}
                        `;
                        
                        document.getElementById('add-btn').disabled = false;
                        document.getElementById('add-btn').dataset.word = entry.word;
                        document.getElementById('add-btn').dataset.phoneticUK = phoneticUK;
                        document.getElementById('add-btn').dataset.phoneticUS = phoneticUS;
                        document.getElementById('add-btn').dataset.meaning = meaningCn;
                        document.getElementById('add-btn').dataset.meaningEn = meaningEn;
                        document.getElementById('add-btn').dataset.example = example;
                    } else {
                        // 单词未找到
                        document.getElementById('preview-word').textContent = word;
                        document.getElementById('preview-phonetic').innerHTML = '<span style="color: #f44336;">未找到发音</span>';
                        document.getElementById('preview-meaning').innerHTML = '<span style="color: #f44336;">未找到释义，请手动输入</span>';
                        document.getElementById('add-btn').disabled = false;
                        document.getElementById('add-btn').dataset.word = word;
                        document.getElementById('add-btn').dataset.phoneticUK = '';
                        document.getElementById('add-btn').dataset.phoneticUS = '';
                        document.getElementById('add-btn').dataset.meaning = '';
                        document.getElementById('add-btn').dataset.meaningEn = '';
                        document.getElementById('add-btn').dataset.example = '';
                    }
                } catch (e) {
                    console.error(e);
                    document.getElementById('preview-word').textContent = word;
                    document.getElementById('preview-phonetic').innerHTML = '<span style="color: #f44336;">加载失败</span>';
                    document.getElementById('add-btn').disabled = false;
                }
            }, 500);
        }
        
        // 简单翻译映射
        function getSimpleTranslation(word, en) {
            const dict = {
                'hello': '你好',
                'world': '世界',
                'beautiful': '美丽的',
                'technology': '科技',
                'important': '重要的',
                'learn': '学习',
                'language': '语言',
                'english': '英语',
                'study': '学习',
                'work': '工作',
                'life': '生活',
                'time': '时间',
                'money': '钱',
                'people': '人们',
                'house': '房子',
                'water': '水',
                'food': '食物',
                'book': '书',
                'music': '音乐',
                'movie': '电影'
            };
            return dict[word.toLowerCase()] || '(点击添加中文释义)';
        }
        
        // 添加单词
        function addWord() {
            const btn = document.getElementById('add-btn');
            const input = document.getElementById('new-word');
            
            const newWord = {
                word: btn.dataset.word || input.value.trim(),
                phoneticUK: btn.dataset.phoneticUK || '/-/',
                phoneticUS: btn.dataset.phoneticUS || '/-/',
                meaning: btn.dataset.meaning || '待添加',
                meaningEn: btn.dataset.meaningEn || '',
                example: btn.dataset.example || ''
            };
            
            // 检查重复
            if (words.some(w => w.word.toLowerCase() === newWord.word.toLowerCase())) {
                alert('单词已存在！');
                return;
            }
            
            words.unshift(newWord); // 添加到开头
            todayStats.total = words.length;
            currentIndex = 0;
            
            saveToStorage();
            displayCurrentWord();
            updateStats();
            renderWordList();
            
            // 重置表单
            input.value = '';
            document.getElementById('word-preview').style.display = 'none';
            document.getElementById('add-btn').disabled = true;
            
            alert('单词添加成功！');
            switchTab('study');
        }
    </script>
</body>
</html>
