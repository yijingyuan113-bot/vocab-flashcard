    var currentIndex = 0;

    function switchTab(tabId) {
        document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
        document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });
        event.target.classList.add('active');
        document.getElementById(tabId).classList.add('active');
        if(tabId === 'list') renderWordList();
    }

    function renderWord() {
        var w = words[currentIndex];
        document.getElementById('current-word').textContent = w.word;
        document.getElementById('phonetic').textContent = w.phonetic;
        document.getElementById('meaning-cn').textContent = w.meaning;
        document.getElementById('meaning-en').textContent = w.meaningEn;
        document.getElementById('progress').textContent = '当前: ' + (currentIndex + 1) + ' / ' + words.length;
    }

    function nextWord() {
        currentIndex = (currentIndex + 1) % words.length;
        renderWord();
    }

    function prevWord() {
        currentIndex = (currentIndex - 1 + words.length) % words.length;
        renderWord();
    }

    function renderWordList(filter) {
        var list = document.getElementById('word-list');
        list.innerHTML = '';
        var filtered = words;
        if (filter) {
            filter = filter.toLowerCase();
            filtered = words.filter(function(w) { 
                return w.word.toLowerCase().indexOf(filter) >= 0 || w.meaning.indexOf(filter) >= 0; 
            });
        }
        filtered.forEach(function(w, i) {
            var item = document.createElement('div');
            item.className = 'word-item';
            item.innerHTML = '<b>' + w.word + '</b> <span>' + w.meaning + '</span>';
            item.onclick = function() {
                currentIndex = words.indexOf(w);
                renderWord();
                switchTab('study');
            };
            list.appendChild(item);
        });
        document.getElementById('total-count').textContent = words.length;
        document.getElementById('counter').textContent = '共 ' + filtered.length + ' 个词汇';
    }

    function filterWords(val) {
        renderWordList(val);
    }

    function playUK() {
        var w = words[currentIndex].word;
        var synth = window.speechSynthesis;
        var utter = new SpeechSynthesisUtterance(w);
        utter.lang = 'en-GB';
        
        // Try to find a female British voice
        var voices = synth.getVoices();
        var femaleGBVoice = voices.find(function(voice) {
            return voice.lang.includes('en-GB') && voice.name.includes('Female');
        });
        if (!femaleGBVoice) {
            femaleGBVoice = voices.find(function(voice) {
                return voice.lang.includes('en-GB') && voice.name.toLowerCase().includes('samantha');
            });
        }
        if (!femaleGBVoice) {
            femaleGBVoice = voices.find(function(voice) {
                return voice.lang.includes('en-GB');
            });
        }
        if (femaleGBVoice) {
            utter.voice = femaleGBVoice;
        }
        
        synth.speak(utter);
    }

    renderWord();
